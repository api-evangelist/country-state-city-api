aid: country-state-city-api
name: Country State City API
x-type: company
description: >-
  The Country State City API is a global geographic reference dataset and
  REST API published by countrystatecity.in. It exposes 247+ countries,
  5,000+ states / provinces, and 150,000+ cities with ISO 3166 codes, phone
  codes, capitals, currencies, native names, regions, sub-regions,
  coordinates, time zones, and flag emoji. The data is also distributed as
  downloadable JSON, SQL, PostgreSQL, SQLite, XML, YAML, and CSV bundles for
  offline use, and the live API is authenticated with the X-CSCAPI-KEY
  header from a free developer plan.
